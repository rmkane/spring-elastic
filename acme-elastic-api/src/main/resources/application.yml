spring:
  application:
    name: ${SPRING_APPLICATION_NAME:spring-elastic-api}
  mvc:
    problemdetails:
      enabled: true
  data:
    elasticsearch:
      uris: ${ES_URIS}
      username: ${ES_USERNAME}
      password: ${ES_PASSWORD}
      connection-timeout: ${ES_CONNECTION_TIMEOUT:10s}
      socket-timeout: ${ES_SOCKET_TIMEOUT:60s}

server:
  port: ${SERVER_PORT:8885}

# TLS CA for Elasticsearch (optional; empty → trust-all in dev — see ElasticsearchConfig)
acme:
  elastic:
    cert-path: ${ES_CERT_PATH:}

springdoc:
  api-docs:
    path: ${SPRINGDOC_API_DOCS_PATH:/v3/api-docs}
  swagger-ui:
    path: ${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: list
    default-models-expand-depth: 2
    filter: true
    persist-authorization: true

logging:
  level:
    org.acme.elastic: ${LOGGING_LEVEL_ORG_ACME_ELASTIC:DEBUG}
    org.springframework.data.elasticsearch: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_DATA_ELASTICSEARCH:DEBUG}
    org.elasticsearch: ${LOGGING_LEVEL_ORG_ELASTICSEARCH:INFO}
